<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f1ead9">
<title>ST0532 — Complete Revision Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f1ead9; --paper-2:#e8dec7; --ink:#1f1812; --ink-soft:#4a3d31;
  --ink-mute:#8a7864; --accent:#b8451e; --accent-soft:#d9692f; --good:#3f6b3a;
  --bad:#a23a2e; --rule:#c9bba0; --card-front:#fbf6e9; --card-back:#1f1812;
  --shadow: 0 1px 0 rgba(31,24,18,.08), 0 12px 28px -12px rgba(31,24,18,.25), 0 3px 8px -3px rgba(31,24,18,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:var(--paper); color:var(--ink);
  font-family:'Geist', system-ui, sans-serif; font-weight:400;
  min-height:100vh; min-height:100dvh; -webkit-font-smoothing:antialiased;
}
body{
  background:
    radial-gradient(ellipse at 20% 0%, rgba(184,69,30,.06), transparent 50%),
    radial-gradient(ellipse at 100% 100%, rgba(31,24,18,.05), transparent 50%),
    var(--paper);
  background-attachment:fixed;
  padding: 28px 22px max(28px, env(safe-area-inset-bottom)); position:relative;
}
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; opacity:.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.10 0 0 0 0 0.07 0 0 0 0.10 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  mix-blend-mode:multiply; z-index:0;
}
.wrap{ max-width: 940px; margin: 0 auto; position:relative; z-index:1;}

/* HEADER */
header{
  display:flex; align-items:flex-end; justify-content:space-between;
  border-bottom:1px solid var(--rule); padding-bottom:14px; margin-bottom:22px;
  gap:20px; flex-wrap:wrap;
}
.brand{ display:flex; flex-direction:column; gap:4px;}
.brand .eyebrow{
  font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--accent); font-weight:500;
}
.brand h1{
  font-family:'Fraunces', serif; font-weight:500; font-size: clamp(26px, 7vw, 42px);
  letter-spacing:-.02em; line-height:1; font-variation-settings:"opsz" 144, "SOFT" 50;
}
.brand h1 em{ font-style:italic; font-weight:400; color:var(--accent);}
.meta{
  font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--ink-mute);
  text-align:right; letter-spacing:.04em; line-height:1.6;
}

/* TABS — horizontal scroll on mobile */
.tabs{
  display:flex; gap:6px; margin-bottom:20px; padding:6px;
  background:rgba(31,24,18,.04); border:1px solid var(--rule); border-radius:14px;
  overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch;
}
.tabs::-webkit-scrollbar{ display:none;}
.tab{
  flex:1 0 auto; padding:9px 14px; background:transparent; border:none;
  border-radius:9px; cursor:pointer; font-family:'Geist', sans-serif; font-weight:500;
  font-size:13px; color:var(--ink-soft); letter-spacing:.01em; text-align:center;
  transition: all .2s ease; white-space:nowrap; display:flex; flex-direction:column;
  align-items:center; gap:2px;
}
.tab:active{ transform: scale(.96);}
.tab.active{ background:var(--ink); color:var(--paper); box-shadow: 0 4px 12px -4px rgba(31,24,18,.4);}
.tab .num{ font-family:'JetBrains Mono', monospace; font-size:9.5px; opacity:.7; letter-spacing:.04em;}
.tab.active .num{ color: var(--accent-soft); opacity:1;}

/* TOOLBAR */
.toolbar{
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  margin-bottom:14px; flex-wrap:wrap;
}
.progress-wrap{ flex:1; min-width:180px; display:flex; flex-direction:column; gap:6px;}
.progress-text{
  font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--ink-mute);
  letter-spacing:.05em; display:flex; justify-content:space-between;
}
.progress-text .stats span{ margin-left:12px;}
.progress-text .good{ color: var(--good); font-weight:500;}
.progress-text .bad{ color: var(--bad); font-weight:500;}
.bar{ height:4px; background:rgba(31,24,18,.1); border-radius:99px; overflow:hidden; display:flex;}
.bar-good, .bar-bad{ height:100%; transition: width .35s cubic-bezier(.4,0,.2,1);}
.bar-good{ background: var(--good);}
.bar-bad{ background: var(--bad);}
.tool-btns{ display:flex; gap:8px;}
.icon-btn{
  width:38px; height:38px; border:1px solid var(--rule); background:var(--paper-2);
  border-radius:10px; cursor:pointer; display:grid; place-items:center; color:var(--ink-soft);
  transition: all .15s ease;
}
.icon-btn:active{ background:var(--ink); color:var(--paper); transform: scale(.94);}
.icon-btn svg{ width:16px; height:16px;}

/* CARD */
.stage{ perspective: 2200px; margin-bottom:20px; touch-action: pan-y;}
.card{
  position:relative; width:100%; min-height: 60vh; cursor:pointer;
  transform-style: preserve-3d; transition: transform .55s cubic-bezier(.5,.1,.3,1); user-select:none;
}
@media(min-width:641px){ .card{ min-height:420px;} }
.card.flipped{ transform: rotateY(180deg);}
.card.swipe-l{ animation: swl .25s ease forwards;}
.card.swipe-r{ animation: swr .25s ease forwards;}
@keyframes swl{ to{ transform: translateX(-120%) rotate(-6deg); opacity:0;} }
@keyframes swr{ to{ transform: translateX(120%) rotate(6deg); opacity:0;} }

.face{
  position:absolute; inset:0; border-radius:18px; padding: 30px 26px;
  backface-visibility:hidden; -webkit-backface-visibility:hidden; display:flex;
  flex-direction:column; box-shadow: var(--shadow); overflow:hidden;
}
@media(min-width:641px){ .face{ padding: 36px 42px;} }
.face.front{ background: var(--card-front); border:1px solid var(--rule);}
.face.front::before{
  content:""; position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.8), transparent);
}
.face.back{ background: var(--card-back); color: var(--paper); transform: rotateY(180deg); border:1px solid var(--ink);}
.face .label{
  font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.18em;
  text-transform:uppercase; margin-bottom:18px; display:flex; justify-content:space-between;
  align-items:center; flex-shrink:0;
}
.face.front .label{ color: var(--accent);}
.face.back .label{ color: var(--accent-soft);}
.face .label .chapter-tag{ color: var(--ink-mute); font-weight:400; letter-spacing:.06em; font-size:10px;}
.face.back .label .chapter-tag{ color: rgba(241,234,217,.45);}

.face .content{
  flex:1; display:flex; flex-direction:column; justify-content:center;
  overflow-y:auto; overflow-x:hidden; width:100%; -webkit-overflow-scrolling:touch;
  padding-right:10px; scrollbar-gutter:stable;
}
.content::-webkit-scrollbar{ width:6px;}
.content::-webkit-scrollbar-track{ background:transparent; margin:2px 0;}
.content::-webkit-scrollbar-thumb{ background:rgba(31,24,18,.2); border-radius:3px;}
.face.back .content::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.22);}

.face .content-inner{
  width:100%; font-family:'Fraunces', serif; font-weight:400;
  font-size: clamp(19px, 5vw, 26px); line-height:1.35; letter-spacing:-.01em;
  font-variation-settings:"opsz" 72, "SOFT" 50;
}
.face.front .content-inner code{
  font-family:'JetBrains Mono', monospace; font-size:.8em; background:rgba(31,24,18,.06);
  padding:1px 5px; border-radius:4px; color:var(--accent); word-break:break-word;
}
.face.front .content-inner em{ font-style:italic; color:var(--accent);}

.face.back .content-inner{
  font-family:'Geist', sans-serif; font-weight:400; font-size: clamp(15px, 4vw, 18px);
  line-height:1.55; letter-spacing:-.005em; color: #ebe1ca;
}
.face.back .content-inner strong{ color:#fff; font-weight:600;}
.face.back .content-inner code{
  font-family:'JetBrains Mono', monospace; background:rgba(255,255,255,.08);
  padding: 1px 6px; border-radius:4px; font-size:.85em; color:var(--accent-soft); word-break:break-word;
}
.face.back .content-inner em{ color: var(--accent-soft); font-style:normal; font-weight:500;}

.face.back .content-inner table{
  width:100%; border-collapse:collapse; margin-top:8px;
  font-family:'Geist',sans-serif; font-size:12px; line-height:1.4;
}
.face.back .content-inner th{
  text-align:left; color:var(--accent-soft); font-weight:600; padding:5px 7px;
  border-bottom:1px solid rgba(255,255,255,.18);
}
.face.back .content-inner td{
  padding:5px 7px; border-bottom:1px solid rgba(255,255,255,.07);
  color:#ddd2bb; vertical-align:top;
}
.face.back .content-inner td code{ font-size:.9em;}

.flip-hint{
  font-family:'JetBrains Mono', monospace; font-size:9.5px; letter-spacing:.13em;
  text-transform:uppercase; color:var(--ink-mute); margin-top:12px; text-align:center;
  opacity:.65; flex-shrink:0;
}
.face.back .flip-hint{ color: rgba(241,234,217,.4);}

/* CONTROLS */
.controls{ display:grid; grid-template-columns: 1fr 2fr 1fr; gap:10px; align-items:center;}
.nav-btn{
  padding: 15px 14px; border-radius:12px; border:1px solid var(--rule); background:var(--paper-2);
  font-family:'Geist', sans-serif; font-weight:500; font-size:14px; color:var(--ink);
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition: all .15s ease;
}
.nav-btn:active:not(:disabled){ background:var(--ink); color:var(--paper); transform: scale(.97);}
.nav-btn:disabled{ opacity:.3; cursor:not-allowed;}
.nav-btn .txt{ display:inline;}
.grade-btns{ display:flex; gap:8px; justify-content:center;}
.grade-btn{
  flex:1; padding: 15px 8px; border-radius:12px; border:1px solid; font-family:'Geist', sans-serif;
  font-weight:600; font-size:13.5px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  gap:6px; transition: all .15s ease; letter-spacing:.01em;
}
.grade-btn.again{ border-color: rgba(162,58,46,.35); color: var(--bad); background: rgba(162,58,46,.06);}
.grade-btn.again:active{ background: var(--bad); color:#fff; transform: scale(.97);}
.grade-btn.got{ border-color: rgba(63,107,58,.35); color: var(--good); background: rgba(63,107,58,.06);}
.grade-btn.got:active{ background: var(--good); color:#fff; transform: scale(.97);}
.grade-btn:disabled{ opacity:.4; cursor:not-allowed;}

.shortcuts{
  margin-top:24px; padding-top:16px; border-top:1px dashed var(--rule);
  font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--ink-mute); display:flex; gap:20px;
  justify-content:center; flex-wrap:wrap;
}
.shortcuts kbd{
  display:inline-block; padding: 2px 7px; background:var(--paper-2); border:1px solid var(--rule);
  border-bottom-width:2px; border-radius:5px; font-family:'JetBrains Mono', monospace; font-size:10px;
  color:var(--ink); margin-right:4px;
}

/* DONE */
.done{ text-align:center; padding: 40px 16px; font-family:'Fraunces', serif;}
.done h2{ font-size: clamp(36px,9vw,46px); font-weight:400; font-style:italic; color:var(--accent); margin-bottom:8px; font-variation-settings:"opsz" 144;}
.done p{ font-family:'Geist', sans-serif; color:var(--ink-soft); font-size:15px; margin-bottom:20px;}
.done .stats-big{ display:flex; justify-content:center; gap:32px; margin: 24px 0; flex-wrap:wrap;}
.done .stat{ display:flex; flex-direction:column;}
.done .stat .n{ font-size:40px; font-weight:500; font-family:'Fraunces', serif;}
.done .stat .l{ font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--ink-mute); margin-top:4px;}
.done .stat.g .n{ color: var(--good);}
.done .stat.b .n{ color: var(--bad);}
.done .done-btns{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}

@media (max-width: 420px){
  .shortcuts{ display:none;}
  .nav-btn .txt{ display:none;}
  .nav-btn{ padding:15px 10px;}
  .controls{ grid-template-columns: auto 1fr auto;}
}

/* MODE TOGGLE */
.mode-toggle{
  display:inline-flex; padding:4px; background:rgba(31,24,18,.05);
  border:1px solid var(--rule); border-radius:11px; gap:3px;
}
.mode-toggle button{
  border:none; background:transparent; cursor:pointer; padding:7px 14px;
  border-radius:8px; font-family:'Geist',sans-serif; font-weight:600; font-size:12.5px;
  color:var(--ink-soft); letter-spacing:.01em; transition:all .15s ease; display:flex; align-items:center; gap:6px;
}
.mode-toggle button.active{ background:var(--accent); color:#fff; box-shadow:0 2px 8px -2px rgba(184,69,30,.5);}
.mode-toggle button:active{ transform:scale(.95);}
.mode-toggle svg{ width:14px; height:14px;}

/* TYPING UI on front */
.type-area{ display:flex; flex-direction:column; gap:10px; margin-top:14px; flex-shrink:0;}
.type-area textarea{
  width:100%; min-height:96px; resize:vertical; padding:13px 15px;
  border:1.5px solid var(--rule); border-radius:12px; background:rgba(255,255,255,.5);
  font-family:'Geist',sans-serif; font-size:15px; line-height:1.5; color:var(--ink);
  transition:border-color .15s ease; -webkit-appearance:none;
}
.type-area textarea:focus{ outline:none; border-color:var(--accent);}
.type-area textarea::placeholder{ color:var(--ink-mute); opacity:.7;}
.type-submit{
  align-self:flex-start; padding:11px 20px; border:none; border-radius:11px;
  background:var(--ink); color:var(--paper); font-family:'Geist',sans-serif;
  font-weight:600; font-size:13.5px; cursor:pointer; transition:all .15s ease;
  display:flex; align-items:center; gap:7px;
}
.type-submit:active{ transform:scale(.97); background:var(--accent);}
.type-hint{
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em;
  color:var(--ink-mute); opacity:.7;
}

/* Reveal panel on the back: shows YOUR answer above the model answer */
.your-answer{
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
  border-radius:12px; padding:13px 15px; margin-bottom:16px; flex-shrink:0;
}
.your-answer .ya-label{
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.15em;
  text-transform:uppercase; color:rgba(241,234,217,.5); margin-bottom:6px;
  display:flex; align-items:center; gap:6px;
}
.your-answer .ya-text{
  font-family:'Geist',sans-serif; font-size:14.5px; line-height:1.5; color:#f4ecd9;
  white-space:pre-wrap; word-break:break-word;
}
.your-answer .ya-text.empty{ color:rgba(241,234,217,.4); font-style:italic;}
.model-label{
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.15em;
  text-transform:uppercase; color:var(--accent-soft); margin-bottom:8px; display:flex; align-items:center; gap:6px;
}

/* when in type mode, front content shrinks so textarea fits */
.card.type-mode .face.front .content{ justify-content:flex-start; flex:0 1 auto; max-height:40%;}
.card.type-mode .face.front{ justify-content:flex-start;}
.card.type-mode .face.front .content-inner{ font-size:clamp(18px,4.6vw,24px);}
/* back of a type-mode card: align to top so verdict/your-answer never get clipped */
.card.type-mode .face.back .content{ justify-content:flex-start;}

/* GRADING VERDICT banner on the back */
.verdict{
  display:flex; align-items:center; gap:11px; padding:13px 15px; border-radius:12px;
  margin-bottom:16px; flex-shrink:0; border:1px solid;
}
.verdict .v-icon{ width:30px; height:30px; border-radius:50%; display:grid; place-items:center; flex-shrink:0;}
.verdict .v-icon svg{ width:17px; height:17px; stroke-width:2.5;}
.verdict .v-body{ display:flex; flex-direction:column; gap:2px; min-width:0;}
.verdict .v-title{ font-family:'Geist',sans-serif; font-weight:700; font-size:15px; letter-spacing:-.01em;}
.verdict .v-sub{ font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.04em; opacity:.85; line-height:1.45;}

.verdict.correct{ background:rgba(63,107,58,.14); border-color:rgba(99,160,90,.4);}
.verdict.correct .v-icon{ background:var(--good); color:#fff;}
.verdict.correct .v-title{ color:#9fd093;}
.verdict.correct .v-sub{ color:#9fd093;}

.verdict.partial{ background:rgba(217,150,47,.13); border-color:rgba(217,150,47,.4);}
.verdict.partial .v-icon{ background:#c98a2e; color:#fff;}
.verdict.partial .v-title{ color:#e8b765;}
.verdict.partial .v-sub{ color:#e8b765;}

.verdict.low{ background:rgba(162,58,46,.14); border-color:rgba(196,90,78,.4);}
.verdict.low .v-icon{ background:var(--bad); color:#fff;}
.verdict.low .v-title{ color:#e09a8e;}
.verdict.low .v-sub{ color:#e09a8e;}

.verdict.blank{ background:rgba(138,120,100,.13); border-color:rgba(138,120,100,.4);}
.verdict.blank .v-icon{ background:var(--ink-mute); color:#fff;}
.verdict.blank .v-title{ color:#c3b39d;}
.verdict.blank .v-sub{ color:#c3b39d;}

/* keyword hit/miss chips */
.keywords{ margin-top:4px; margin-bottom:16px; flex-shrink:0;}
.kw-head{
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.13em; text-transform:uppercase;
  color:rgba(241,234,217,.45); margin-bottom:7px;
}
.kw-list{ display:flex; flex-wrap:wrap; gap:6px;}
.kw{
  font-family:'Geist',sans-serif; font-size:12px; font-weight:500; padding:3px 9px; border-radius:7px;
  display:inline-flex; align-items:center; gap:5px; line-height:1.3;
}
.kw svg{ width:11px; height:11px; stroke-width:3;}
.kw.hit{ background:rgba(63,107,58,.22); color:#a8d69c;}
.kw.miss{ background:rgba(162,58,46,.18); color:#e3a99e;}

@keyframes fade{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform: translateY(0);}}
.card.changing .face{ animation: fade .3s ease;}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="brand">
    <span class="eyebrow">ST0532 · Computer Organisation</span>
    <h1>Complete <em>Flashcards</em></h1>
  </div>
  <div class="meta" id="meta">Loading…</div>
</header>

<div class="tabs" id="tabs"></div>

<div style="display:flex;justify-content:center;margin-bottom:16px;">
  <div class="mode-toggle" id="modeToggle">
    <button data-mode="flip" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17v-6h-6"/><path d="M3 13a9 9 0 0 0 15 5.5M21 11A9 9 0 0 0 6 5.5"/></svg>Flip</button>
    <button data-mode="type"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M6 12h.01M18 12h.01M7 16h10"/></svg>Type answer</button>
  </div>
</div>

<div class="toolbar">
  <div class="progress-wrap">
    <div class="progress-text">
      <span id="cardCount">Card 1</span>
      <span class="stats"><span class="good" id="goodCount">✓ 0</span><span class="bad" id="badCount">↻ 0</span></span>
    </div>
    <div class="bar"><div class="bar-good" id="barGood" style="width:0%"></div><div class="bar-bad" id="barBad" style="width:0%"></div></div>
  </div>
  <div class="tool-btns">
    <button class="icon-btn" id="shuffleBtn" title="Shuffle (S)" aria-label="Shuffle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
    </button>
    <button class="icon-btn" id="resetBtn" title="Reset (R)" aria-label="Reset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
  </div>
</div>

<div class="stage" id="stage">
  <div class="card" id="card">
    <div class="face front">
      <div class="label"><span>Question</span><span class="chapter-tag" id="chapTagFront"></span></div>
      <div class="content"><div class="content-inner" id="qText"></div></div>
      <div class="flip-hint">Tap to flip · swipe to navigate</div>
    </div>
    <div class="face back">
      <div class="label"><span>Answer</span><span class="chapter-tag" id="chapTagBack"></span></div>
      <div class="content"><div class="content-inner" id="aText"></div></div>
      <div class="flip-hint">Grade yourself below</div>
    </div>
  </div>

     a:`Two or more devices sharing data.<br><br>The <strong>TCP/IP protocol stack</strong> makes this work across the entire planet using a <strong>layered design</strong>.`},
    {q:`What four things do networks let computers do?`,
     a:`<strong>Share resources</strong> — files, printers, internet.<br><strong>Communicate</strong> — email, video calls, messaging.<br><strong>Collaborate</strong> — edit the same document simultaneously.<br><strong>Scale</strong> — combine many small machines into one large service.`},
    {q:`kbps vs kBps — meaning and use?`,
     a:`<strong>kbps</strong> (small b) = <em>kilobits</em> per second — network speed.<br><br><strong>kBps</strong> (big B) = <em>kilobytes</em> per second — file transfer rates.`},
    {q:`Exact values: 1 kbps and 1 kBps?`,
     a:`1 kbps = <strong>1,000 bits</strong> per second.<br>1 kBps = <strong>1,024 bytes</strong> per second.`},
    {q:`How do you convert between bits and bytes?`,
     a:`<strong>Divide by 8</strong> to convert bits → bytes.<br><strong>Multiply by 8</strong> to convert bytes → bits.`},
    {q:`List the network <em>hardware</em> components.`,
     a:`<strong>NIC</strong> — converts your computer's data into network signals.<br><strong>Network medium</strong> — copper cable, fibre-optic, or radio waves.<br><strong>Interconnecting devices</strong> — hubs, switches, routers, access points.<br><strong>End devices</strong> — PCs, servers, phones, IoT sensors.`},
    {q:`List the network <em>software</em> components.`,
     a:`<strong>Operating system</strong> with networking support.<br><strong>Protocols</strong> (TCP/IP, HTTP, etc.) — agreed rules for communication.<br><strong>Applications</strong> — browser, email client, video conferencing tool.`},
    {q:`Name the four TCP/IP layers (top → bottom) + protocols.`,
     a:`<strong>4. Application</strong> — HTTP, FTP, DNS, SMTP.<br><strong>3. Transport</strong> — TCP, UDP.<br><strong>2. Internet</strong> — IP.<br><strong>1. Link</strong> — Ethernet, Wi-Fi.<br><br>Each layer only talks to the layer above and below it.`},
    {q:`Application layer — job & address used?`,
     a:`<strong>What the user is actually doing.</strong> Protocols: HTTP, FTP, DNS, SMTP — the "what" being sent.<br><br>Addresses: <strong>hostnames, URLs</strong>.`},
    {q:`Transport layer — job & address used?`,
     a:`<strong>End-to-end conversation; ports.</strong> Reliable/unreliable delivery via TCP/UDP.<br><br>Addresses: <strong>port numbers</strong>.`},
    {q:`Internet layer — job & address used?`,
     a:`<strong>Routing between networks.</strong> Protocol: IP.<br><br>Addresses: <strong>IP address</strong>.`},
    {q:`Link layer — job & address used?`,
     a:`<strong>Delivery within a single network.</strong> Ethernet, Wi-Fi — local delivery.<br><br>Addresses: <strong>MAC address</strong>.`},
    {q:`Analogy for MAC vs IP?`,
     a:`MAC = the device's <strong>postal address</strong>; IP = its <strong>name</strong> — both are needed to deliver a letter.`},
    {q:`MAC vs IP — which layer is each?`,
     a:`<strong>MAC</strong> = Link layer (2).<br><strong>IP</strong> = Internet layer (3).`},
    {q:`MAC vs IP — length of each?`,
     a:`<strong>MAC</strong> = 48 bits (6 bytes).<br><strong>IP</strong> (IPv4) = 32 bits.`},
    {q:`MAC vs IP — format, with examples?`,
     a:`<strong>MAC</strong> = 6 hex pairs, e.g. <code>D8-D3-85-EB-12-E3</code> (or <code>04-40-31-5B-1A-C4</code>).<br><br><strong>IP</strong> = 4 decimals, e.g. <code>10.10.10.143</code> (or <code>192.168.1.41</code>).`},
    {q:`MAC vs IP — scope?`,
     a:`<strong>MAC</strong> = local network only.<br><strong>IP</strong> = across the entire internet.`},
    {q:`MAC vs IP — who assigns each?`,
     a:`<strong>MAC</strong> = NIC manufacturer (permanent).<br><strong>IP</strong> = network admin or DHCP.`},
    {q:`MAC vs IP — what is each used for?`,
     a:`<strong>MAC</strong> = hop-by-hop delivery.<br><strong>IP</strong> = end-to-end routing.`},
    {q:`Structure of a MAC address (its two halves)?`,
     a:`<strong>First 24 bits = OUI</strong> (Organisationally Unique Identifier) — tells you the vendor (Cisco, Apple, Intel…).<br><br><strong>Last 24 bits</strong> = unique serial number from that vendor.<br><br>Guarantees every NIC has a different MAC from the factory.`},
    {q:`Memory hook for MAC vs IP permanence?`,
     a:`<strong>"MAC stays forever, IP can change."</strong><br><br>MAC is burnt in at the factory; IP can be reassigned by DHCP each time a device joins a network.`},
    {q:`The two reserved addresses in every subnet?`,
     a:`<strong>Network address</strong> — first address — identifies the network itself.<br><br><strong>Broadcast address</strong> — last address — sends a message to every device in the subnet.`},
    {q:`For <code>10.10.10.0/24</code>, give network, first/last host, broadcast, total usable.`,
     a:`Network: <code>10.10.10.0</code><br>First usable host: <code>10.10.10.1</code><br>Last usable host: <code>10.10.10.254</code><br>Broadcast: <code>10.10.10.255</code><br>Total usable hosts: <strong>254</strong>`},
    {q:`Analogy for a broadcast address?`,
     a:`Like an <strong>announcement over a shopping-mall loudspeaker</strong> — every device in the subnet hears the same message at the same time.`},
    {q:`Why is usable hosts always <code>2ⁿ − 2</code>?`,
     a:`The <strong>first (network)</strong> and <strong>last (broadcast)</strong> addresses of every subnet are reserved and can't be assigned to a real device.`},
    {q:`What is a subnet mask?`,
     a:`Tells you which part of an IP address is the <strong>network</strong> and which part is the <strong>host</strong>.`},
    {q:`What does mask <code>255.255.255.0</code> mean, applied to <code>10.10.10.143</code>?`,
     a:`First three octets (255.255.255) = <strong>network</strong>; last octet (0) = <strong>host</strong>.<br><br>So network = <code>10.10.10.0</code>, host = <strong>143</strong>.`},
    {q:`LAN — full name & coverage?`,
     a:`<strong>Local Area Network</strong> — a single building, office, or home.`},
    {q:`WLAN — full name & coverage?`,
     a:`<strong>Wireless LAN</strong> — a LAN using Wi-Fi instead of cable.`},
    {q:`MAN — full name & coverage?`,
     a:`<strong>Metropolitan Area Network</strong> — a city, campus, or large district.`},
    {q:`WAN — full name & coverage?`,
     a:`<strong>Wide Area Network</strong> — country-wide or global.`},
    {q:`Internet vs Intranet vs Extranet?`,
     a:`<strong>Internet</strong> — the largest WAN; worldwide network of networks.<br><strong>Intranet</strong> — private internal network inside a single organisation.<br><strong>Extranet</strong> — controlled access to partners (suppliers, customers reach part of the intranet).`},
    {q:`The three private IP ranges (RFC 1918) + total sizes.`,
     a:`<table>
     <tr><th>Range</th><th>Total addresses</th></tr>
     <tr><td>10.0.0.0 – 10.255.255.255</td><td>16,777,216</td></tr>
     <tr><td>172.16.0.0 – 172.31.255.255</td><td>1,048,576</td></tr>
     <tr><td>192.168.0.0 – 192.168.255.255</td><td>65,536</td></tr>
     </table>
     Never routed on the public internet.`},
    {q:`Which private range does your home Wi-Fi typically use?`,
     a:`Devices get IPs starting with <strong>192.168.</strong> — the private range in action.`},
    {q:`What are public IPs, and who allocates them?`,
     a:`Routable on the open internet, must be <strong>unique worldwide</strong>.<br><br>Allocated to ISPs by <strong>regional internet registries (RIRs)</strong>.`},
    {q:`What is a <em>packet</em> (layer, contents, who reads it)?`,
     a:`<strong>Internet layer (3).</strong><br><br>Data + source/destination <strong>IP addresses</strong> (+ port numbers).<br><br>Travels across networks; <strong>routers</strong> read the IP addresses to forward it.`},
    {q:`What is a <em>frame</em> (layer, contents, who reads it)?`,
     a:`<strong>Link layer (2).</strong><br><br>Wraps a packet with source/destination <strong>MAC addresses</strong> + an error-check trailer.<br><br>Travels within a single network; <strong>switches</strong> read the MAC addresses to forward it.`},
    {q:`Packet vs frame — side by side.`,
     a:`<table>
     <tr><th></th><th>Packet</th><th>Frame</th></tr>
     <tr><td>Layer</td><td>Internet (3)</td><td>Link (2)</td></tr>
     <tr><td>Addressing</td><td>IP</td><td>MAC</td></tr>
     <tr><td>Travels</td><td>Between networks</td><td>Within one network</td></tr>
     <tr><td>Contains</td><td>Data + IP header</td><td>Packet + MAC header & trailer</td></tr>
     </table>`},
    {q:`What is encapsulation?`,
     a:`The process of <strong>adding header (and trailer) information at each layer</strong> as data moves down the stack.`},
    {q:`Show the encapsulation chain from app data to frame.`,
     a:`Application data<br>↓ +Transport TCP/UDP header → <strong>Segment</strong><br>↓ +Internet IP header → <strong>Packet</strong><br>↓ +Link MAC header + trailer → <strong>Frame</strong><br>→ sent on the wire`},
    {q:`Why send data in small bursts (3 reasons)?`,
     a:`<strong>Reliability</strong> — only a small chunk re-sent if something fails.<br><strong>Fair sharing</strong> — many devices can interleave traffic.<br><strong>Routing flexibility</strong> — different packets can take different paths.`},
    {q:`Typical and possible packet sizes?`,
     a:`Typical ~<strong>1,500 bytes</strong> (standard Ethernet maximum).<br><br>Range: <strong>40 up to 9,000 bytes</strong> (jumbo frames).`},
    {q:`Frame-and-envelope analogy?`,
     a:`A frame is to a packet what an <strong>envelope</strong> is to a <strong>letter</strong>. The letter (packet) carries the message + destination (IP); the envelope (frame) carries postal-route info for the current leg (MAC).`},
    {q:`Client vs server (definitions)?`,
     a:`<strong>Client</strong> — the computer/software that <em>requests</em> a service.<br><br><strong>Server</strong> — the computer/software that <em>provides</em> a service.`},
    {q:`In what three contexts is "client"/"server" used?`,
     a:`1. The <strong>operating system</strong> (Windows 11 vs Windows Server).<br>2. The <strong>physical computer</strong>.<br>3. The <strong>piece of software</strong> running on that computer.`},
    {q:`Trace visiting a website (client–server).`,
     a:`1. Browser (client software) asks for example.com.<br>2. Request travels the internet as packets.<br>3. Web server (server software) responds with the HTML.<br>4. Browser displays the page.`}
  ]
},
{
  short:"4", tab:"Ch 4", title:"Net Devices",
  cards:[
    {q:`The core idea: hubs, switches, routers all move data, but differ how?`,
     a:`They operate at <strong>different layers</strong> and with very different <strong>intelligence</strong>.<br><br>Knowing which is which is the difference between a working and broken network.`},
    {q:`What is a NIC, and what forms can it take?`,
     a:`<strong>Network Interface Card</strong> — the hardware that connects a computer to a network.<br><br>Can be a card, an onboard chip, or a USB dongle.`},
    {q:`What does every NIC have (3 things)?`,
     a:`• A unique <strong>48-bit MAC address</strong> stored in ROM.<br>• <strong>Indicator lights</strong> — link, activity, often speed.<br>• A <strong>driver</strong> so the OS can talk to it.`},
    {q:`NIC status lights — link, activity, colour.`,
     a:`<strong>Link</strong> (typically green) — successfully connected to the medium.<br><strong>Activity</strong> (blinking) — data being sent/received.<br><strong>Different colours</strong> on multi-speed NICs — indicate speed (e.g. amber = 100 Mbps, green = 1000 Mbps).`},
    {q:`How does a wireless NIC connect to an access point?`,
     a:`Using an <strong>SSID</strong> (the Wi-Fi network name) and usually a <strong>security key</strong>.`},
    {q:`802.11 (original) — range, max speed, band?`,
     a:`20 m indoor / 100 m outdoor · <strong>2 Mbps</strong> · 2.4 GHz.`},
    {q:`802.11a — range, max speed, band?`,
     a:`35 m / 119 m · <strong>54 Mbps</strong> · 5 GHz.`},
    {q:`802.11b — range, max speed, band?`,
     a:`35 m / 140 m · <strong>11 Mbps</strong> · 2.4 GHz.`},
    {q:`802.11g — range, max speed, band?`,
     a:`45 m / 90 m · <strong>54 Mbps</strong> · 2.4 GHz.`},
    {q:`802.11n — range, max speed, band?`,
     a:`70 m / 250 m · <strong>600 Mbps</strong> · 2.4 / 5 GHz.`},
    {q:`802.11ac — range, max speed, band?`,
     a:`35 m / N/A · <strong>6.9 Gbps</strong> · 5 GHz.`},
    {q:`802.11ax (Wi-Fi 6) — range, max speed, band?`,
     a:`30 m / 120 m · <strong>9.6 Gbps</strong> · 2.4 / 5 / 6 GHz.`},
    {q:`802.11be (Wi-Fi 7) — range, max speed, band?`,
     a:`30 m / 120 m · <strong>46.1 Gbps</strong> · 2.4 / 5 / 6 GHz.`},
    {q:`5 GHz vs 2.4 GHz tradeoff?`,
     a:`<strong>5 GHz</strong> — faster but shorter range.<br><strong>2.4 GHz</strong> — slower but goes further and penetrates walls better.`},
    {q:`What does a <em>repeater</em> do?`,
     a:`Receives a <strong>weakened signal, regenerates it</strong> (cleans up noise), and forwards it on — extending max cable length.<br><br>It <strong>regenerates, not just amplifies</strong> (amplifying would boost the noise too).`},
    {q:`What is a <em>hub</em>, and how does it behave?`,
     a:`A <strong>multi-port repeater</strong>. Receives a bit signal on one port and <strong>broadcasts it out every other port</strong>, regardless of destination.<br><br>No intelligence — it doesn't know where devices are.`},
    {q:`Why are hubs obsolete?`,
     a:`They <strong>flood the entire network</strong> with every frame, causing congestion; all ports <strong>share the same bandwidth</strong>. Switches replaced them.`},
    {q:`What layer are repeaters and hubs?`,
     a:`<strong>Layer 1 (Physical)</strong> — "dumb" devices.`},
    {q:`What is a <em>switch</em>, and how does it forward?`,
     a:`A <strong>Layer 2</strong> device that looks like a hub but is intelligent — it examines incoming frames and forwards each <strong>only to the port that needs it</strong>.`},
    {q:`How does a switch learn (3 steps)?`,
     a:`1. When a frame arrives, it records <strong>source MAC + arriving port</strong> in its table.<br>2. It looks up the <strong>destination MAC</strong>.<br>3. If found → forward only out that port. If not found → <strong>flood (broadcast)</strong> and learn next time.`},
    {q:`What does a switch learn from vs forward on?`,
     a:`It always <strong>learns from the source MAC</strong> of every frame, but <strong>forwards based on the destination MAC</strong>.<br><br>Over time the table fills and it gets more efficient.`},
    {q:`Switch vs hub — full comparison.`,
     a:`<table>
     <tr><th>Feature</th><th>Hub</th><th>Switch</th></tr>
     <tr><td>Forwarding</td><td>Broadcast to all</td><td>Unicast to correct port</td></tr>
     <tr><td>Bandwidth</td><td>Shared</td><td>Dedicated per port</td></tr>
     <tr><td>Duplex</td><td>Half only</td><td>Full (send + receive)</td></tr>
     <tr><td>Intelligence</td><td>None</td><td>MAC address table</td></tr>
     <tr><td>Performance</td><td>Slow, congestion</td><td>Fast, efficient</td></tr>
     </table>`},
    {q:`What happens when a switch meets an unknown destination MAC?`,
     a:`It <strong>floods</strong> the frame (behaves like a hub for that one frame), then <strong>learns</strong> and behaves normally next time.`},
    {q:`What is a <em>router</em>, and what does it use to forward?`,
     a:`A <strong>Layer 3</strong> device that connects different LANs and forwards packets between them using <strong>IP addresses</strong>.`},
    {q:`What does a router do, step by step?`,
     a:`• Reads the <strong>destination IP</strong> of an incoming packet.<br>• Looks up the best path in its <strong>routing table</strong>.<br>• Forwards the packet toward the destination (possibly via other routers).<br>• Does <strong>not forward broadcast traffic</strong> by default → contains broadcast storms.`},
    {q:`Read a router's routing table example.`,
     a:`<table>
     <tr><th>Destination</th><th>Next hop</th></tr>
     <tr><td>192.168.1.0/24</td><td>directly connected (LAN A)</td></tr>
     <tr><td>192.168.2.0/24</td><td>directly connected (LAN B)</td></tr>
     <tr><td>10.0.0.0/8</td><td>203.0.113.1 (upstream)</td></tr>
     <tr><td>Default 0.0.0.0/0</td><td>203.0.113.1 (ISP)</td></tr>
     </table>`},
    {q:`During routing, what changes and what stays the same?`,
     a:`The <strong>IP header stays the same</strong> (end-to-end addressing).<br><br>The <strong>MAC header is replaced at every hop</strong> (hop-by-hop delivery).<br><br>IP = end-to-end; MAC = each hop.`},
    {q:`Hub vs Switch vs Router — layer?`,
     a:`<strong>Hub</strong> = Physical/Link (1).<br><strong>Switch</strong> = Link (2).<br><strong>Router</strong> = Internet (3).`},
    {q:`Hub vs Switch vs Router — forwarding decision?`,
     a:`<strong>Hub</strong> blindly broadcasts.<br><strong>Switch</strong> uses destination MAC.<br><strong>Router</strong> uses destination IP.`},
    {q:`Hub vs Switch vs Router — information stored?`,
     a:`<strong>Hub</strong> — none.<br><strong>Switch</strong> — MAC ↔ port table.<br><strong>Router</strong> — routing table.`},
    {q:`Hub vs Switch vs Router — unit forwarded?`,
     a:`<strong>Hub</strong> — bits.<br><strong>Switch</strong> — frames.<br><strong>Router</strong> — packets.`},
    {q:`Hub vs Switch vs Router — duplex & stops broadcasts?`,
     a:`<strong>Duplex:</strong> hub half · switch full or half · router full.<br><br><strong>Stops broadcasts:</strong> hub no · switch no · router <strong>yes (by default)</strong>.`},
    {q:`Hub vs Switch vs Router — what do they connect?`,
     a:`<strong>Hub & Switch</strong> — devices on the same LAN.<br><strong>Router</strong> — different LANs.`},
    {q:`What is CIDR notation?`,
     a:`<strong>Classless Inter-Domain Routing</strong> — writes an IP with its mask as <code>IP/prefix</code>.<br><br>The prefix = number of bits for the <strong>network portion</strong>; the rest are <strong>host bits</strong>.`},
    {q:`How does CIDR slice the 32 bits?`,
     a:`Every IPv4 address is 32 bits.<br><br><strong>Network bits</strong> = first <em>p</em> (same for everyone in the subnet).<br><strong>Host bits</strong> = 32 − <em>p</em> (name each device).`},
    {q:`Bigger /p means…?`,
     a:`A <strong>smaller network</strong>. A /24 has 254 hosts; a /30 has only 2.`},
    {q:`The two quantities you always compute first in CIDR.`,
     a:`<strong>Host bits</strong> &nbsp;h = 32 − p &nbsp;(bits naming a device).<br><br><strong>Block size</strong> &nbsp;B = 256 − (mask value of split octet) &nbsp;(the step between adjacent subnets).`},
    {q:`The five CIDR answers and how to get each.`,
     a:`1. <strong>Subnet mask</strong> — p ones then (32−p) zeros, dotted decimal.<br>2. <strong>Total addresses</strong> — 2^h.<br>3. <strong>Usable hosts</strong> — 2^h − 2.<br>4. <strong>Network address</strong> — round the IP's split octet DOWN to nearest multiple of block size; later octets all 0.<br>5. <strong>Broadcast</strong> — split octet = network split octet + (B−1); later octets all 255.`},
    {q:`In CIDR, which address is network and which is broadcast?`,
     a:`First address (all host bits = 0) = <strong>network</strong>.<br>Last address (all host bits = 1) = <strong>broadcast</strong>.<br><br>Neither assignable → usable = 2ⁿ − 2.`},
    {q:`Power-of-two reference: total & usable for h = 2, 4, 6, 8.`,
     a:`<table>
     <tr><th>Host bits</th><th>Total 2^h</th><th>Usable 2^h−2</th></tr>
     <tr><td>2</td><td>4</td><td>2</td></tr>
     <tr><td>4</td><td>16</td><td>14</td></tr>
     <tr><td>6</td><td>64</td><td>62</td></tr>
     <tr><td>8</td><td>256</td><td>254</td></tr>
     </table>`},
    {q:`Power-of-two reference: total & usable for h = 10, 11, 12, 16.`,
     a:`<table>
     <tr><th>Host bits</th><th>Total 2^h</th><th>Usable 2^h−2</th></tr>
     <tr><td>10</td><td>1,024</td><td>1,022</td></tr>
     <tr><td>11</td><td>2,048</td><td>2,046</td></tr>
     <tr><td>12</td><td>4,096</td><td>4,094</td></tr>
     <tr><td>16</td><td>65,536</td><td>65,534</td></tr>
     </table>`},
    {q:`Which prefixes are a "clean break" (no split octet)?`,
     a:`<strong>/8, /16, /24, /32</strong> — the boundary sits cleanly between octets; no binary needed.`},
    {q:`For /9–/15, which octet splits and what's after it?`,
     a:`Mask <code>255.X.0.0</code> — split octet is the <strong>2nd</strong>; octets after = 3rd & 4th.`},
    {q:`For /17–/23, which octet splits and what's after it?`,
     a:`Mask <code>255.255.X.0</code> — split octet is the <strong>3rd</strong>; octet after = 4th.`},
    {q:`For /25–/31, which octet splits and what's after it?`,
     a:`Mask <code>255.255.255.X</code> — split octet is the <strong>4th</strong>; no octets after.`},
    {q:`Mask value ↔ bits used ↔ block size (full list).`,
     a:`<table>
     <tr><th>Bits</th><th>Mask value</th><th>Block (256−mask)</th></tr>
     <tr><td>1</td><td>128</td><td>128</td></tr>
     <tr><td>2</td><td>192</td><td>64</td></tr>
     <tr><td>3</td><td>224</td><td>32</td></tr>
     <tr><td>4</td><td>240</td><td>16</td></tr>
     <tr><td>5</td><td>248</td><td>8</td></tr>
     <tr><td>6</td><td>252</td><td>4</td></tr>
     <tr><td>7</td><td>254</td><td>2</td></tr>
     <tr><td>8</td><td>255</td><td>1</td></tr>
     </table>
     Pattern: 128, 192, 224, 240, 248, 252, 254, 255.`},
    {q:`Worked Example 1 — <code>192.168.1.0/24</code>, give every value.`,
     a:`p=24, h=8, clean break.<br><br>Mask <strong>255.255.255.0</strong> · total <strong>256</strong> · usable <strong>254</strong>.<br>Network <strong>192.168.1.0</strong> · broadcast <strong>192.168.1.255</strong>.<br>Usable range <strong>192.168.1.1 – 192.168.1.254</strong>.`},
    {q:`Worked Example 2 — <code>172.22.20.159/21</code>, give every value.`,
     a:`p=21, h=11, split 3rd octet, mask 248, block 8.<br><br>Mask <strong>255.255.248.0</strong> · total <strong>2,048</strong> · usable <strong>2,046</strong>.<br>Network: 20 rounds down to 16 → <strong>172.22.16.0</strong>.<br>Broadcast: 16 + (8−1) = 23 → <strong>172.22.23.255</strong>.<br>Range <strong>172.22.16.1 – 172.22.23.254</strong>.`},
    {q:`The common /21 trap with <code>172.22.20.159</code>?`,
     a:`Don't assume the network is <code>172.22.20.0</code> — the boundary cuts <strong>inside the 3rd octet</strong>, so it rounds DOWN to <strong>172.22.16.0</strong>.<br><br>Always check the block size first.`},
    {q:`Worked Example 3 — <code>192.168.10.100/26</code>, give every value.`,
     a:`p=26, h=6, split 4th octet, mask 192, block 64.<br><br>Mask <strong>255.255.255.192</strong> · total <strong>64</strong> · usable <strong>62</strong>.<br>Network: 100 rounds down to 64 → <strong>192.168.10.64</strong>.<br>Broadcast: 64 + (64−1) = 127 → <strong>192.168.10.127</strong>.<br>Range <strong>192.168.10.65 – 192.168.10.126</strong>.`},
    {q:`The sanity check after every CIDR calculation?`,
     a:`The IP given in the question must sit <strong>between the network address and the broadcast address</strong> (inclusive).<br><br>If not, your network address is wrong — redo the block-size step.`},
    {q:`What problem does NAT solve?`,
     a:`There aren't enough public IPv4 addresses for every device on Earth — <strong>NAT lets many devices share one public IP</strong>.`},
    {q:`What is NAT, and how does it work (4 steps)?`,

function render(){
  const sig = currentDeck+'|'+order[pos]+'|'+mode;
  const card0 = document.getElementById('card');

  if(!sameCard){

    mountCard();

    const card=document.getElementById('card');
    card.classList.remove('swipe-l','swipe-r');

// ── GRADING ENGINE ──────────────────────────────────────
// Stopwords we don't score on (too common to be meaningful).
const STOP=new Set(("the a an of to in on at for and or but is are be been being as by with from into "+
 "that this these those it its do does the their your you we they he she his her them then than so "+
 "if not no yes can could would should will shall may might must each every both all any some most "+
 "more less when where which who whom what why how only just also very much many up out off down "+
 "over under per via e g eg ie etc using used use uses make makes made get gets got go goes "+
 "one two three four five first last next via about between within across toward towards same "+
 "other another such only own here there now i'll you'll they're it's there's").split(/\s+/));

// strip HTML tags + entities from the model answer to get plain text
function stripHTML(html){
  const d=document.createElement('div'); d.innerHTML=html;
  let t=d.textContent||d.innerText||'';
  return t.replace(/\u00a0/g,' ');
}
// normalise a token: lowercase, drop punctuation, keep digits & letters
function norm(w){ return w.toLowerCase().replace(/[^a-z0-9./+-]/g,''); }

// Shared tokeniser: split on whitespace + most punctuation, but DO NOT break a
// decimal/version like 9.6, 2.4, 802.11, 192.168 (digit . digit stays joined).
function tokenize(text){
  return text
    .replace(/(\d)\.(\d)/g,'$1\u00b7$2')        // protect decimals (temp middot)
    .split(/[\s,;:.()\u2014\u2013/]+/)
    .map(t=>t.replace(/\u00b7/g,'.'))            // restore decimals
    .map(norm)
    .filter(Boolean);
}

// Levenshtein distance (for spelling tolerance)
function lev(a,b){
  const m=a.length,n=b.length;
  if(!m) return n; if(!n) return m;
  let prev=Array.from({length:n+1},(_,i)=>i), cur=new Array(n+1);
  for(let i=1;i<=m;i++){
    cur[0]=i;
    for(let j=1;j<=n;j++){
      const cost=a[i-1]===b[j-1]?0:1;
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);
    }
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
// is user token a fuzzy match for a key token? (tolerate typos proportional to length)
function fuzzyEq(u,k){
  if(u===k) return true;
  if(k.length>=4 && (u.includes(k)||k.includes(u))) return true; // stem / substring
  const tol = k.length<=4?1 : k.length<=7?2 : 3;
  return lev(u,k)<=tol;
}

// Extract key terms from model answer.
// PRIMARY terms = emphasised spans (<strong>/<code>/<em>) — these are what we grade on.
// If the answer has NO emphasis at all, fall back to meaningful plain words.
// Returns array of {display, tokens:[normed words]}.
function extractKeywords(answerHTML){
  const primary=[]; const seen=new Set();
  const add=(arr,raw)=>{
    const disp=raw.trim().replace(/\s+/g,' ');
    if(!disp) return;
    const toks=tokenize(disp).filter(w=>w.length>1 && !STOP.has(w));
    if(!toks.length) return;
    const key=toks.join(' ');
    if(seen.has(key)) return; seen.add(key);
    arr.push({display:disp.replace(/[.,;:]+$/,''), tokens:toks});
  };
  const re=/<(?:strong|code|em)>(.*?)<\/(?:strong|code|em)>/gis;
  let m;
  while((m=re.exec(answerHTML))){ add(primary, stripHTML(m[1])); }

  if(primary.length>=2){
    return primary.slice(0,12);   // grade on the highlighted essentials only
  }
  // fallback: no/low emphasis — harvest meaningful plain words
  const plain=stripHTML(answerHTML);
  const fb=[...primary];
  tokenize(plain).forEach(n=>{
    if(n.length>3 && !STOP.has(n) && !/^\d+$/.test(n)) add(fb,n);
  });
  return fb.slice(0,10);
}

function gradeAnswer(userText, answerHTML){
  const user = userText.trim();
  const keys = extractKeywords(answerHTML);
  if(!keys.length) return {pct:0, hits:[], misses:[], blank:!user};
  if(!user) return {pct:0, hits:[], misses:keys, blank:true};
  const userToks = tokenize(user);
  const hits=[], misses=[];
  keys.forEach(term=>{
    let ok;
    if(term.tokens.length===1){
      ok = userToks.some(ut => fuzzyEq(ut, term.tokens[0]));
    } else {
      // multi-word term: count as hit if MOST of its tokens are present
      const matched = term.tokens.filter(kt => userToks.some(ut => fuzzyEq(ut, kt))).length;
      ok = matched >= Math.ceil(term.tokens.length * 0.6);
    }
    (ok?hits:misses).push(term);
  });
  const pct = Math.round(hits.length / keys.length * 100);
  return {pct, hits, misses, blank:false};
}

function renderTypeBack(){
  const ya=document.getElementById('yourAns'); if(!ya) return;
  const userText = (answers[order[pos]]||'');
  const t = userText.trim();
  if(t){ ya.textContent=t; ya.classList.remove('empty'); }
  else { ya.textContent='(left blank)'; ya.classList.add('empty'); }

  const c = DECKS[currentDeck].cards[order[pos]];
  const g = gradeAnswer(userText, c.a);

  // verdict banner
  const v=document.getElementById('verdict');
  let cls,title,sub,icon;
  const tick=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`;
  const half=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 0 1 0 20Z"/><circle cx="12" cy="12" r="10"/></svg>`;
  const cross=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>`;
  const dash=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>`;
  if(g.blank){ cls='blank'; title='Left blank'; sub='Reveal the answer and try the next one'; icon=dash; }
  else if(g.pct>=70){ cls='correct'; title='Correct'; sub=`You hit ${g.hits.length} of ${g.hits.length+g.misses.length} key points`; icon=tick; }
  else if(g.pct>=35){ cls='partial'; title='Partially correct'; sub=`${g.pct}% — you got ${g.hits.length} of ${g.hits.length+g.misses.length} key points`; icon=half; }
  else { cls='low'; title='Keep practising'; sub=`${g.pct}% — ${g.hits.length} of ${g.hits.length+g.misses.length} key points matched`; icon=cross; }
  v.className='verdict '+cls;
  v.innerHTML=`<div class="v-icon">${icon}</div><div class="v-body"><div class="v-title">${title}</div><div class="v-sub">${sub}</div></div>`;

  // keyword chips
  const kw=document.getElementById('keywords');
  if(g.blank || (!g.hits.length && !g.misses.length)){ kw.innerHTML=''; }
  else {
    const chip=(term,hit)=>`<span class="kw ${hit?'hit':'miss'}">${hit?tick:cross}${term.display}</span>`;
    kw.innerHTML = `<div class="kw-head">Key points · <span style="color:#a8d69c">green = you mentioned it</span> · <span style="color:#e3a99e">red = missed</span></div>`+
      `<div class="kw-list">${g.hits.map(t=>chip(t,true)).join('')}${g.misses.map(t=>chip(t,false)).join('')}</div>`;
  }
}

function bindCard(){
  const card=document.getElementById('card');
  card.onclick=(e)=>{
    if(mode==='type') return;            // typing mode flips only via Check button
    if(dragging) return;
    flip();
  };
  // swipe
  let sx=0,sy=0,dx=0,active=false;
  card.addEventListener('touchstart',e=>{ if(e.target.tagName==='TEXTAREA'){active=false;return;} sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;active=true;dragging=false;},{passive:true});
  card.addEventListener('touchmove',e=>{
    if(!active)return;
    dx=e.touches[0].clientX-sx;
    const dyAbs=Math.abs(e.touches[0].clientY-sy);
    if(Math.abs(dx)>10&&Math.abs(dx)>dyAbs){dragging=true;}
  },{passive:true});
  card.addEventListener('touchend',()=>{
    if(!active)return; active=false;
    if(dragging&&Math.abs(dx)>60){
      if(dx<0&&pos<order.length-1){ animateNext(); }
      else if(dx>0&&pos>0){ animatePrev(); }
    }
    setTimeout(()=>dragging=false,50);
  });
}
let dragging=false;

function animateNext(){
  const card=document.getElementById('card');
  card.classList.add('swipe-l');
  setTimeout(()=>{pos++;flipped=false;render();},240);
}
function animatePrev(){
  const card=document.getElementById('card');
  card.classList.add('swipe-r');
  setTimeout(()=>{pos--;flipped=false;render();},240);
}

function flip(){ flipped=!flipped; render(); }
function next(){ if(pos<order.length-1){pos++;flipped=false;render();} else checkDone(); }
function prev(){ if(pos>0){pos--;flipped=false;render();} }
function grade(v){
  if(!flipped)return;
  graded[order[pos]]=v;
  if(pos<order.length-1){pos++;flipped=false;render();}
  else {render();setTimeout(checkDone,250);}
}
function checkDone(){ if(Object.keys(graded).length===order.length) showDone(); }

function showDone(){
  const good=Object.values(graded).filter(v=>v==='good').length;
  const bad=Object.values(graded).filter(v=>v==='bad').length;
  const pct=Math.round(good/order.length*100);
  stage.innerHTML=`<div class="done">
    <h2>Deck complete</h2>
    <p>Chapter ${DECKS[currentDeck].short} · ${DECKS[currentDeck].title}</p>
    <div class="stats-big">
      <div class="stat g"><div class="n">${good}</div><div class="l">Got it</div></div>
      <div class="stat b"><div class="n">${bad}</div><div class="l">To review</div></div>
      <div class="stat"><div class="n">${pct}%</div><div class="l">Score</div></div>
    </div>
    <div class="done-btns">
      <button class="nav-btn" id="restartBtn">Restart deck</button>
      <button class="nav-btn" id="reviewBadBtn" ${bad===0?'disabled':''}>Review missed only</button>
    </div></div>`;
  document.getElementById('restartBtn').onclick=()=>{ graded={};gradedAll[currentDeck]=graded;answers={};answersAll[currentDeck]=answers;order=DECKS[currentDeck].cards.map((_,k)=>k);pos=0;flipped=false;render(); };
  document.getElementById('reviewBadBtn').onclick=()=>{ const m=Object.entries(graded).filter(([k,v])=>v==='bad').map(([k])=>+k);graded={};gradedAll[currentDeck]=graded;order=m;pos=0;flipped=false;render(); };
  prevBtn.disabled=true;nextBtn.disabled=true;againBtn.disabled=true;gotBtn.disabled=true;
}

function shuffle(){
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  pos=0;flipped=false;graded={};gradedAll[currentDeck]=graded;answers={};answersAll[currentDeck]=answers;render();
}
function reset(){ order=DECKS[currentDeck].cards.map((_,k)=>k);pos=0;flipped=false;graded={};gradedAll[currentDeck]=graded;answers={};answersAll[currentDeck]=answers;render(); }

prevBtn.onclick=prev; nextBtn.onclick=next;
againBtn.onclick=()=>grade('bad'); gotBtn.onclick=()=>grade('good');
shuffleBtn.onclick=shuffle; resetBtn.onclick=reset;

const modeToggle=document.getElementById('modeToggle');
modeToggle.querySelectorAll('button').forEach(b=>{
  b.onclick=()=>{
    mode=b.dataset.mode;
    modeToggle.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b));
    flipped=false; render();
  };
});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();flip();}
  else if(e.code==='ArrowRight')next();
  else if(e.code==='ArrowLeft')prev();
  else if(e.key==='1')grade('bad');
  else if(e.key==='2')grade('good');
  else if(e.key.toLowerCase()==='s')shuffle();
  else if(e.key.toLowerCase()==='r')reset();
});

bindCard();
selectDeck(0);
</script>
</body>
